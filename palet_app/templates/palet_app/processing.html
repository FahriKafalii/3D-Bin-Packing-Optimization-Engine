{% extends 'base.html' %}

{% block title %}İşleniyor - Akıllı Palet Yerleştirme{% endblock %}

{% block content %}
<div class="py-8 max-w-3xl mx-auto">
    <div class="text-center mb-8">
        <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Optimizasyon çalışıyor, lütfen bekleyin...</h2>
        <p id="progressText" class="text-gray-600">Veri işleniyor...</p>
    </div>
    
    <div class="mb-6 bg-gray-200 rounded-full h-4 overflow-hidden">
        <div id="progressBar" class="bg-blue-600 h-4 w-0"></div>
    </div>
    
    <div class="bg-gray-900 text-white font-mono text-sm p-4 rounded-xl shadow-inner h-64 overflow-auto">
        <div id="logContainer" class="whitespace-pre-line"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    $(document).ready(function() {
        const logContainer = $('#logContainer');
        const progressBar = $('#progressBar');
        const progressText = $('#progressText');
        
        let completed = false;
        let lastStepCount = 0;
        let retryCount = 0;
        let maxRetries = 3;
        let timeoutId;
        let requestInProgress = false;

        // Yumuşak bar state'i — rAF ile 1-1 yaklaşır
        const bar = { displayed: 0, target: 0, finalPush: false };
        function tickBar() {
            if (bar.displayed < bar.target) {
                const diff = bar.target - bar.displayed;
                const step = bar.finalPush
                    ? Math.max(0.8, diff * 0.15)
                    : Math.max(0.08, diff * 0.04);
                bar.displayed = Math.min(bar.target, bar.displayed + step);
                progressBar.css('width', `${bar.displayed.toFixed(1)}%`);
            }
            requestAnimationFrame(tickBar);
        }
        requestAnimationFrame(tickBar);
        
        // İşlem durumunu kontrol et
        function checkStatus() {
            if (completed || requestInProgress) return;
            
            requestInProgress = true;
            
            $.ajax({
                url: '{% url "palet_app:optimization_status" %}',
                type: 'GET',
                dataType: 'json',
                timeout: 10000,  // 10 saniye timeout
                success: function(response) {
                    requestInProgress = false;
                    retryCount = 0;  // Başarılı istek, retry sayacını sıfırla
                    
                    if (response.success) {
                        if (response.completed) {
                            // İşlem tamamlandı, analiz sayfasına yönlendir
                            completed = true;
                            bar.target = 100;
                            bar.finalPush = true;
                            progressText.text('Optimizasyon tamamlandı! Yönlendiriliyor...');
                            addLogMessage('✓ İşlem başarıyla tamamlandı!');
                            
                            setTimeout(function() {
                                window.location.href = response.next_url;
                            }, 1500);
                        } else {
                            // Hedef yüzdeyi backend'den al (faz tabanlı); bar rAF ile yumuşak ilerler
                            const target = (typeof response.percent === 'number')
                                ? response.percent
                                : Math.max(0, Math.min(95, (response.current_step / response.total_steps) * 100));
                            if (target > bar.target) bar.target = target;
                            
                            // Mesajları güncelle, ancak yalnızca yeni mesajları ekle
                            if (response.messages.length > lastStepCount) {
                                for (let i = lastStepCount; i < response.messages.length; i++) {
                                    addLogMessage(response.messages[i]);
                                }
                                lastStepCount = response.messages.length;
                            }
                            
                            // Hatayı kontrol et
                            if (response.current_step < 0) {
                                progressText.text('Bir hata oluştu!');
                                addLogMessage('⚠ İşlem sırasında bir hata oluştu. Lütfen tekrar deneyin.', true);
                                completed = true;
                            } else {
                                // Duruma göre metni güncelle
                                progressText.text(`Adım ${response.current_step} / ${response.total_steps}: İşleniyor...`);
                            }
                            
                            // Tekrar kontrol et (2 saniye sonra)
                            if (!completed) {
                                timeoutId = setTimeout(checkStatus, 2000);
                            }
                        }
                    } else {
                        // Hata
                        addLogMessage('⚠ Hata: ' + response.error, true);
                        progressText.text('Bir hata oluştu!');
                        completed = true;
                    }
                },
                error: function(xhr, status, error) {
                    requestInProgress = false;
                    
                    if (status === 'timeout') {
                        addLogMessage('⏱ İstek zaman aşımına uğradı. Yeniden deneniyor...');
                    } else {
                        retryCount++;
                        addLogMessage(`⚠ Bağlantı hatası (Deneme ${retryCount}/${maxRetries})`);
                    }
                    
                    // Maksimum deneme sayısına ulaşıldıysa durdur
                    if (retryCount >= maxRetries) {
                        addLogMessage('✗ Sunucu ile iletişim kurulamadı. Lütfen sayfayı yenileyin.', true);
                        progressText.text('Bağlantı hatası!');
                        completed = true;
                    } else if (!completed) {
                        // Yeniden dene (5 saniye sonra)
                        timeoutId = setTimeout(checkStatus, 5000);
                    }
                }
            });
        }
        
        // Log mesajı ekle
        function addLogMessage(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const msgClass = isError ? 'text-red-500' : 'text-green-400';
            
            const logEntry = $(`<div class="${msgClass}">[${timestamp}] ${message}</div>`);
            logContainer.append(logEntry);
            
            // Otomatik kaydır
            const container = document.getElementById('logContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        // Sayfadan ayrılınca backend'e iptal sinyali gönder
        function sendCancel() {
            if (completed) return;
            try {
                const url = '{% url "palet_app:cancel_optimization" %}';
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(url, new Blob([], {type: 'text/plain'}));
                } else {
                    $.ajax({ url: url, type: 'POST', async: false });
                }
            } catch (_e) {}
        }
        $(window).on('beforeunload pagehide', function() {
            if (timeoutId) clearTimeout(timeoutId);
            sendCancel();
        });
        
        // Başlangıç ​​mesajı
        const algoritma = '{{ request.session.algoritma|default:"greedy" }}';
        addLogMessage('🚀 Optimizasyon işlemi başlatılıyor...');
        
        {% if request.session.container_info %}
        addLogMessage('📦 Container: {{ request.session.container_info.length }}x{{ request.session.container_info.width }}x{{ request.session.container_info.height }} cm');
        {% endif %}
        
        if (algoritma === 'genetic') {
            addLogMessage('🧬 Genetik Algoritma (GA) motoru aktif');
            addLogMessage('   → Hızlı yakınsama, güvenilir sonuçlar');
            addLogMessage('⏳ Bu işlem 1-3 dakika sürebilir...');
        } else if (algoritma === 'differential_evolution') {
            addLogMessage('⚛️ Differential Evolution (DE) motoru aktif');
            addLogMessage('   → İleri seviye optimizasyon, fitness önbellekleme');
            addLogMessage('   → İki aşamalı değerlendirme sistemi');
            addLogMessage('⏳ Bu işlem 1-3 dakika sürebilir...');
        } else {
            addLogMessage('⚡ Greedy algoritması aktif');
            addLogMessage('⏳ İşlem 30-60 saniye sürebilir...');
        }
        
        // İlk durumu kontrol et
        setTimeout(checkStatus, 1000);
    });
</script>
{% endblock %}
